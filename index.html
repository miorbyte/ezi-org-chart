<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPP Org Chart - Final Fix</title>
    <link rel="stylesheet" href="style_v2.css">
    <script src="https://balkangraph.com/js/orgchart.js"></script>
</head>
<body>

    <div class="container">
        <h1 class="no-print">📊 Penjana Carta BPP</h1>
        
        <section class="input-section no-print">
            <input type="text" id="chartTitle" oninput="document.getElementById('displayTitle').innerText = this.value" placeholder="Taip Tajuk Carta Di Sini...">
            
            <div class="form-personal">
                <input type="text" id="userName" placeholder="Nama">
                <input type="text" id="userRole" placeholder="Jawatan">
                <select id="reportsTo">
                    <option value="">-- Pilih Bos --</option>
                </select>
                <input type="file" id="userPhoto" accept="image/*">
                <button onclick="addNode()" id="addBtn">➕ Tambah</button>
            </div>
        </section>

        <section class="action-bar no-print">
            <button onclick="downloadPDF()" class="btn-pdf">📄 Cetak / Save PDF</button>
            <button onclick="saveData()" class="btn-save">💾 Simpan JSON</button>
            <button onclick="loadData()" class="btn-open">📂 Buka JSON</button>
        </section>

        <div id="preview-container">
            <div id="print-zone">
                <h2 id="displayTitle">Tajuk Carta</h2>
                <div id="tree"></div>
            </div>
        </div>
    </div>

    <script src="script_v2.js"></script>
</body>
</html>
