<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZI ORG CHART GENERATOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://balkangraph.com/js/orgchart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 class="no-print"><i class="fas fa-sitemap"></i> EZI ORG CHART GENERATOR</h1>

        <div class="input-card no-print">
            <h3><i class="fas fa-edit"></i> Maklumat Carta</h3>
            <input type="text" id="chartTitle" oninput="updateDisplayTitle(this.value)" placeholder="Masukkan Tajuk Carta (Contoh: Unit Pentadbiran BPP)">
        </div>

        <div class="input-card no-print">
            <h3><i class="fas fa-user-plus"></i> Tambah Kakitangan</h3>
            <div class="form-personal">
                <input type="text" id="userName" placeholder="Nama Penuh">
                <input type="text" id="userRole" placeholder="Jawatan">
                <select id="reportsTo">
                    <option value="">-- Melapor Kepada (Ketua) --</option>
                </select>
                <div class="upload-container">
                    <label for="userPhoto" class="custom-file-upload">
                        <i class="fas fa-camera"></i> Muat Naik Foto
                    </label>
                    <input type="file" id="userPhoto" accept="image/*" onchange="updateFileName(this)">
                    <small id="file-name-display">Tiada foto dipilih</small>
                </div>
                <button onclick="addNode()" id="addBtn"><i class="fas fa-plus-circle"></i> Tambah Staf</button>
            </div>
        </div>

        <div class="action-bar no-print">
            <button onclick="window.print()" class="btn btn-pdf"><i class="fas fa-file-pdf"></i> Cetak PDF</button>
            <button onclick="saveData()" class="btn btn-save"><i class="fas fa-save"></i> Simpan JSON</button>
            <button onclick="loadData()" class="btn btn-open"><i class="fas fa-folder-open"></i> Buka JSON</button>
        </div>

        <div id="print-zone">
            <h2 id="displayTitle">Tajuk Carta Organisasi</h2>
            <div id="tree"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
