<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Sistem Carta Organisasi BPP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://balkangraph.com/js/orgchart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="no-print">
            <h1><i class="fas fa-sitemap"></i> Carta Organisasi BPP</h1>
        </header>

        <section class="input-section no-print">
            <div class="input-card">
                <input type="text" id="chartTitle" oninput="document.getElementById('displayTitle').innerText = this.value" placeholder="Masukkan Tajuk Carta...">
                <div class="form-personal">
                    <input type="text" id="userName" placeholder="Nama Kakitangan">
                    <input type="text" id="userRole" placeholder="Jawatan">
                    <select id="reportsTo">
                        <option value="">-- Melapor Kepada --</option>
                    </select>
                    <input type="file" id="userPhoto" accept="image/*">
                    <button onclick="addNode()"><i class="fas fa-plus"></i> Tambah</button>
                </div>
            </div>
        </section>

        <div class="action-bar no-print">
            <button onclick="window.print()" class="btn-pdf">Cetak PDF</button>
        </div>

        <div id="print-zone">
            <h2 id="displayTitle">Tajuk Carta</h2>
            <div id="tree"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
