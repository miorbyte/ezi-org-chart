<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Carta Organisasi BPP</title>
    <script src="https://balkangraph.com/js/orgchart.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header class="no-print">
            <h1><i class="fas fa-sitemap"></i> Pengurusan Carta BPP</h1>
        </header>
        
        <section class="input-section no-print">
            <div class="input-card">
                <h3><i class="fas fa-edit"></i> Maklumat Carta</h3>
                <input type="text" id="chartTitle" oninput="document.getElementById('displayTitle').innerText = this.value" placeholder="Masukkan Tajuk Carta (Contoh: Unit Pentadbiran BPP)">
                
                <hr style="margin: 25px 0; border: 0; border-top: 1px solid #e2e8f0;">
                
                <h3><i class="fas fa-user-plus"></i> Tambah Kakitangan</h3>
                <div class="form-personal">
                    <input type="text" id="userName" placeholder="Nama Penuh">
                    <input type="text" id="userRole" placeholder="Jawatan">
                    <select id="reportsTo">
                        <option value="">-- Melapor Kepada (Ketua) --</option>
                    </select>
                    
                    <div class="upload-wrapper">
                        <label for="userPhoto" class="custom-file-upload">
                            <i class="fas fa-image"></i> Klik Untuk Muat Naik Foto Profil
                        </label>
                        <input type="file" id="userPhoto" accept="image/*" onchange="updateFileName(this)">
                        <span id="file-name-display">Tiada foto dipilih</span>
                    </div>

                    <button onclick="addNode()" id="addBtn">
                        <i class="fas fa-plus-circle"></i> Tambah Staf
                    </button>
                </div>
            </div>
        </section>

        <section class="action-bar no-print">
            <button onclick="window.print()" class="btn-pdf"><i class="fas fa-file-pdf"></i> Cetak PDF</button>
            <button onclick="saveData()" class="btn-save"><i class="fas fa-save"></i> Simpan JSON</button>
            <button onclick="loadData()" class="btn-open"><i class="fas fa-folder-open"></i> Buka JSON</button>
        </section>

        <div id="print-zone">
            <h2 id="displayTitle">Tajuk Carta Organisasi</h2>
            <div id="tree"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
