<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penjana Carta Organisasi BPP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://balkangraph.com/js/orgchart.js"></script>
</head>
<body>

    <div class="container">
        <h1 class="no-print">📊 Pengurusan Carta Organisasi</h1>
        
        <section class="input-section no-print">
            <input type="text" id="chartTitle" oninput="document.getElementById('displayTitle').innerText = this.value" placeholder="Masukkan Tajuk Carta (Contoh: Carta Organisasi BPP)">
            
            <div class="form-personal">
                <input type="text" id="userName" placeholder="Nama Kakitangan">
                <input type="text" id="userRole" placeholder="Jawatan">
                <select id="reportsTo">
                    <option value="">-- Melapor Kepada --</option>
                </select>
                <div class="upload-wrapper">
                    <label>Gambar:</label>
                    <input type="file" id="userPhoto" accept="image/*">
                </div>
                <button onclick="addNode()" id="addBtn">➕ Tambah Staf</button>
            </div>
        </section>

        <section class="action-bar no-print">
            <button onclick="downloadPDF()" class="btn-pdf">📄 Cetak / Simpan PDF</button>
            <button onclick="saveData()" class="btn-save">💾 Simpan JSON</button>
            <button onclick="loadData()" class="btn-open">📂 Buka Fail JSON</button>
        </section>

        <div id="preview-container">
            <div id="print-zone">
                <h2 id="displayTitle">Tajuk Carta</h2>
                <div id="tree"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
