<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EZI ORG CHART GENERATOR</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://balkangraph.com/js/orgchart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --success: #059669;
            --danger: #dc2626;
            --warning: #f59e0b;
            --bg: #f1f5f9;
            --cream: #fffdf5;
            --dot: #d1d5db;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: #1e293b; }

        .container { 
            max-width: 1200px; margin: 0 auto; background: white; padding: 20px; 
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; 
        }

        h1 { text-align: center; color: var(--primary); font-weight: 800; font-size: 1.5rem; margin-bottom: 20px; }

        .input-card { background: #ffffff; padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; }

        #chartTitle { width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #e2e8f0; border-radius: 10px; text-align: center; font-weight: 600; }

        .form-personal { display: grid; grid-template-columns: 1fr; gap: 12px; }

        @media (min-width: 768px) {
            .form-personal { grid-template-columns: 1.5fr 1.2fr 1.2fr 1fr 0.8fr; }
            h1 { font-size: 2rem; }
            .container { padding: 40px; }
        }

        input[type="text"], select { padding: 12px; border: 1.5px solid #cbd5e1; border-radius: 8px; width: 100%; font-size: 16px; box-sizing: border-box; }

        .upload-container { position: relative; text-align: center; }
        #userPhoto { opacity: 0; position: absolute; width: 0.1px; height: 0.1px; z-index: -1; }
        .custom-file-upload { display: block; border: 2px dashed var(--secondary); background: #eff6ff; color: var(--secondary); padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 700; transition: 0.3s; }
        .custom-file-upload:hover { background: var(--secondary); color: white; }
        #file-name-display { font-size: 10px; color: #64748b; margin-top: 5px; display: block; }

        #addBtn { background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; height: 48px; }

        .action-bar { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 20px 0; }
        @media (min-width: 600px) { .action-bar { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 992px) { .action-bar { grid-template-columns: repeat(4, 1fr); } }

        .btn { border: none; padding: 12px; border-radius: 8px; color: white; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-pdf { background: var(--danger); }
        .btn-png { background: var(--warning); } /* Butang PNG kekal Amber */
        .btn-save { background: var(--primary); }
        .btn-open { background: #64748b; }

        #displayTitle { text-align: center; color: var(--primary); margin-top: 30px; font-weight: 800; font-size: 1.2rem; }

        /* AREA PREVIEW CARTA */
        #tree { 
            width: 100%; height: 550px; border: 1px solid #e2e8f0; border-radius: 12px; margin-top: 10px; 
            background-color: var(--cream);
            background-image: radial-gradient(var(--dot) 1px, transparent 1px);
            background-size: 20px 20px;
            touch-action: none;
        }

        @media (min-width: 768px) { #tree { height: 750px; } #displayTitle { font-size: 1.8rem; } }

        .no-print { display: block; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

    <div class="container no-print">
        <h1><i class="fas fa-sitemap"></i> EZI ORG CHART</h1>

        <div class="input-card">
            <h3><i class="fas fa-edit"></i> Tajuk Carta</h3>
            <input type="text" id="chartTitle" oninput="updateDisplayTitle(this.value)" placeholder="Nama Unit / Organisasi">
        </div>

        <div class="input-card">
            <h3><i class="fas fa-user-plus"></i> Tambah Staf</h3>
            <div class="form-personal">
                <input type="text" id="userName" placeholder="Nama Penuh">
                <input type="text" id="userRole" placeholder="Jawatan">
                <select id="reportsTo">
                    <option value="">-- Melapor Kepada --</option>
                </select>
                <div class="upload-container">
                    <label for="userPhoto" class="custom-file-upload">
                        <i class="fas fa-camera"></i> Muat Naik Foto
                    </label>
                    <input type="file" id="userPhoto" accept="image/*" onchange="updateFileName(this)">
                    <small id="file-name-display">Tiada foto</small>
                </div>
                <button onclick="addNode()" id="addBtn">Tambah</button>
            </div>
        </div>

        <div class="action-bar">
            <button onclick="printChartOnly()" class="btn btn-pdf"><i class="fas fa-file-pdf"></i> PDF</button>
            <button onclick="exportToTransparentPNG()" class="btn btn-png"><i class="fas fa-file-image"></i> PNG (Transparent)</button>
            <button onclick="saveData()" class="btn btn-save"><i class="fas fa-save"></i> Simpan JSON</button>
            <button onclick="loadData()" class="btn btn-open"><i class="fas fa-folder-open"></i> Buka JSON</button>
        </div>
    </div>

    <div id="capture-zone">
        <h2 id="displayTitle">Tajuk Carta Organisasi</h2>
        <div id="tree"></div>
    </div>

    <script>
        let employeeData = [];
        let chart;

        // FUNGSI BARU: Eksport ke PNG TRANSPARENT
        async function exportToTransparentPNG() {
            if (employeeData.length === 0) {
                alert("Sila tambah staf terlebih dahulu.");
                return;
            }

            const captureZone = document.getElementById('capture-zone');
            
            // Beri notifikasi sekejap
            const btnPng = document.querySelector('.btn-png');
            const originalText = btnPng.innerHTML;
            btnPng.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

            // PAKSA SEMUA BACKGROUND JADI TRANSPARENT SEMASA TANGKAPAN
            html2canvas(captureZone, {
                backgroundColor: null,      // KUNCI: Jadikan background capture NULL (Transparent)
                useCORS: true,              // Benarkan imej CORS
                scale: 2,                   // Kualiti HD
                onclone: (clonedDoc) => {
                    // Paksa div #tree di dalam klon untuk buang background cream/dot
                    const clonedTree = clonedDoc.getElementById('tree');
                    if (clonedTree) {
                        clonedTree.style.backgroundColor = 'transparent';
                        clonedTree.style.backgroundImage = 'none';
                        clonedTree.style.border = 'none'; // Buang border juga untuk hasil bersih
                    }
                }
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'carta_organisasi_ezi_transparent.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
                
                // Kembalikan butang asal
                btnPng.innerHTML = originalText;
            });
        }

        // --- FUNGSI ASAL KEKAL ---
        function printChartOnly() {
            if (employeeData.length === 0) return;
            const chartSvg = document.querySelector('#tree svg');
            if (!chartSvg) return;
            const tajuk = document.getElementById('displayTitle').innerText;
            const printWin = window.open('', '', 'width=1100,height=850');
            printWin.document.write(`<html><head><title>Cetak</title><style>body{margin:0;padding:40px;font-family:'Inter',sans-serif;text-align:center;background-color:#fffdf5!important;background-image:radial-gradient(#d1d5db 1px,transparent 1px)!important;background-size:20px 20px!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}h2{color:#1e3a8a;margin-bottom:20px;font-size:24pt;}#print-wrapper{width:100%;display:flex;justify-content:center;}svg{width:100%!important;height:auto!important;max-height:80vh;}@page{size:A4 landscape;margin:0;}</style></head><body><h2>${tajuk}</h2><div id="print-wrapper">${chartSvg.outerHTML}</div></body></html>`);
            printWin.document.close();
            setTimeout(() => { printWin.focus(); printWin.print(); printWin.close(); }, 800);
        }

        // --- FUNGSI LOGIK ASAL KEKAL ---
        function updateDisplayTitle(val) { document.getElementById('displayTitle').innerText = val || "Tajuk Carta Organisasi"; }
        function updateFileName(input) { const display = document.getElementById('file-name-display'); display.textContent = input.files.length > 0 ? "Fail: " + input.files[0].name : "Tiada foto"; }
        function setupTemplate() {
            OrgChart.templates.eziCustom = Object.assign({}, OrgChart.templates.ana);
            OrgChart.templates.eziCustom.size = [250, 130];
            OrgChart.templates.eziCustom.node = '<rect x="0" y="0" height="130" width="250" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" rx="15" ry="15"></rect>';
            OrgChart.templates.eziCustom.field_0 = '<foreignObject x="95" y="15" width="145" height="45"><div xmlns="http://www.w3.org/1999/xhtml" style="font-weight:800; font-size:14px; color:#1e3a8a; line-height:1.1; display:flex; align-items:center; height:100%; word-break:break-word;">{val}</div></foreignObject>';
            OrgChart.templates.eziCustom.field_1 = '<foreignObject x="95" y="65" width="145" height="55"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:12px; color:#64748b; line-height:1.2; font-weight:500; display:block; word-break:break-word; overflow:hidden;">{val}</div></foreignObject>';
            OrgChart.templates.eziCustom.img_0 = '<clipPath id="ulaImg"><circle cx="45" cy="65" r="38"></circle></clipPath><circle cx="45" cy="65" r="40" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"></circle><image preserveAspectRatio="xMidYMid slice" clip-path="url(#ulaImg)" xlink:href="{val}" x="7" y="27" width="76" height="76"></image>';
        }
        function renderChart() {
            const treeDiv = document.getElementById("tree");
            if (employeeData.length === 0) return;
            if (!OrgChart.templates.eziCustom) setupTemplate();
            chart = new OrgChart(treeDiv, { nodes: employeeData, template: "eziCustom", enableSearch: false, userSearchControl: false, mouseWheel: OrgChart.action.zoom, nodeBinding: { field_0: "name", field_1: "title", img_0: "img" } });
            updateDropdown();
        }
        function addNode() {
            const nameVal = document.getElementById('userName').value.trim();
            const roleVal = document.getElementById('userRole').value.trim();
            const pidVal = document.getElementById('reportsTo').value || null;
            const photoFile = document.getElementById('userPhoto').files[0];
            if (!nameVal || !roleVal) { alert("Sila isi Nama dan Jawatan!"); return; }
            const id = Date.now().toString();
            if (photoFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = 150; canvas.height = 150;
                        canvas.getContext('2d').drawImage(img, 0, 0, 150, 150);
                        saveAndPush(id, pidVal, nameVal, roleVal, canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(photoFile);
            } else { saveAndPush(id, pidVal, nameVal, roleVal, ""); }
            document.getElementById('userName').value = ""; document.getElementById('userRole').value = ""; document.getElementById('userPhoto').value = ""; document.getElementById('file-name-display').textContent = "Tiada foto";
        }
        function saveAndPush(id, pid, name, title, img) { employeeData.push({ id, pid, name, title, img }); renderChart(); }
        function updateDropdown() { const select = document.getElementById('reportsTo'); const current = select.value; select.innerHTML = '<option value="">-- Melapor Kepada --</option>'; employeeData.forEach(n => select.add(new Option(n.name, n.id))); select.value = current; }
        function saveData() { if (employeeData.length === 0) return; const blob = new Blob([JSON.stringify(employeeData, null, 2)], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "carta_ezi.json"; a.click(); }
        function loadData() { const input = document.createElement('input'); input.type = 'file'; input.accept = '.json'; input.onchange = e => { const reader = new FileReader(); reader.onload = ev => { employeeData = JSON.parse(ev.target.result); renderChart(); }; reader.readAsText(e.target.files[0]); }; input.click(); }
    </script>
</body>
</html>
